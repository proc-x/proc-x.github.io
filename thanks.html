<!doctype html>
<html lang="ja" data-theme="light" data-lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PROC.X | お問い合わせありがとうございます</title>
    <meta
      name="description"
      content="PROC.X へのお問い合わせを受け付けました。内容を確認のうえ、順次ご連絡します。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/site.css" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
          var l = localStorage.getItem('lang');
          if (l === 'en') { document.documentElement.setAttribute('data-lang', 'en'); document.documentElement.lang = 'en'; }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">本文へ移動</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="PROC.X トップへ">
          <img src="images/logo.png" alt="PROC.X" />
        </a>

        <div class="header-controls">
          <button class="ctrl-btn" id="theme-toggle" aria-label="ダークモード切替">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="lang-toggle" aria-label="Switch language / 言語切替">
            <span class="ja">EN</span><span class="en">JA</span>
          </button>
        </div>
      </div>
    </header>

    <main id="main">
      <section class="section">
        <div class="container narrow">
          <p class="section-eyebrow">
            <span class="ja">Contact Received</span>
            <span class="en">Contact Received</span>
          </p>
          <h1>
            <span class="ja">お問い合わせを受け付けました</span>
            <span class="en">Thanks for contacting us</span>
          </h1>
          <p class="section-lead">
            <span class="ja">内容を確認のうえ、順次ご連絡します。通常は数営業日以内に返信します。</span>
            <span class="en">We have received your message and will review it shortly. We usually reply within a few business days.</span>
          </p>
          <p style="margin-top: 24px;">
            <a class="btn btn-primary" href="/">
              <span class="ja">トップへ戻る</span>
              <span class="en">Back to Home</span>
            </a>
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>&copy; 2026 PROC.X Inc.</small>
      </div>
    </footer>

    <script src="scripts/main.js" defer></script>
  </body>
</html>
